apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: namespace-provisioner-token
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: namespace-provisioner-token
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: /sandbox/platform-engineering/admin-token
        property: token
