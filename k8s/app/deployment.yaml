apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-provisioner
  namespace: platform
  labels:
    app.kubernetes.io/name: namespace-provisioner
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: namespace-provisioner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: namespace-provisioner
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: namespace-provisioner
      containers:
        - name: api
          # Overridden by CI with commit SHA — never deployed as-is
          image: PLACEHOLDER:PLACEHOLDER
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: namespace-provisioner-token
                  key: ADMIN_TOKEN
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
