apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Requests and Limits
    policies.kyverno.io/description: >-
      Requires that all containers specify CPU and memory requests and limits.
      This prevents resource contention and ensures proper scheduling.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - kyverno
                - external-secrets
      validate:
        message: >-
          All containers must specify resource requests and limits for both CPU
          and memory. Set resources.requests.cpu, resources.requests.memory,
          resources.limits.cpu, and resources.limits.memory on each container.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
