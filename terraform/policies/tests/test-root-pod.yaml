# Test manifest: should be REJECTED by deny-run-as-root policy
apiVersion: v1
kind: Pod
metadata:
  name: test-root-pod
  namespace: platform
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sh", "-c", "echo hello"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        runAsNonRoot: false
