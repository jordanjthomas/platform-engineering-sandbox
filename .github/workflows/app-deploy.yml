name: App Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/app-deploy.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: platform-engineering-app
  EKS_CLUSTER: platform-engineering-sandbox
  K8S_NAMESPACE: platform

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "tags=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: app
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: sandbox
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace/
          kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/${{ env.K8S_NAMESPACE }} --timeout=30s
          kubectl apply -f k8s/external-secrets/
          if kubectl api-resources --api-group=kyverno.io -o name 2>/dev/null | grep -q clusterpolicies; then
            kubectl apply -f k8s/kyverno/
          else
            echo "Kyverno CRDs not found — skipping policy apply (install Kyverno via Terraform first)"
          fi
          kubectl apply -f k8s/app/

      - name: Update deployment image
        run: |
          kubectl set image deployment/namespace-provisioner \
            api=${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/namespace-provisioner -n ${{ env.K8S_NAMESPACE }} --timeout=120s
