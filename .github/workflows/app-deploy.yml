name: App Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/app-deploy.yml"

permissions:
  id-token: write
  contents: read
  checks: write
  security-events: write

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: platform-engineering-app
  EKS_CLUSTER: platform-engineering-sandbox
  K8S_NAMESPACE: platform

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run tests
        run: cd app && python -m pytest tests/ -v --tb=short --junit-xml=../test-results/pytest.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: test-results/pytest.xml
          reporter: java-junit

  build-and-scan:
    name: Build & Scan
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          else
            IMAGE_URI="${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          fi
          echo "tags=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: app
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: sandbox
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace/
          kubectl apply -f k8s/app/

      - name: Update deployment image
        run: |
          kubectl set image deployment/namespace-provisioner \
            api=${{ needs.build-and-scan.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/namespace-provisioner -n ${{ env.K8S_NAMESPACE }} --timeout=120s
