name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "ap-southeast-2"
  TF_WORKING_DIR: "terraform"
  TF_IN_AUTOMATION: "true"
  TF_ENVIRONMENT: "sandbox"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var-file="config/${{ env.TF_ENVIRONMENT }}.tfvars" \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=${exitcode}" >> $GITHUB_OUTPUT
          # exit 0 = no changes, exit 2 = changes present — neither is an error
          [ $exitcode -eq 1 ] && exit 1 || exit 0
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const MAX  = 60000;

            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan     = '${{ steps.plan.outcome }}';
            const exitcode = '${{ steps.plan.outputs.exitcode }}';

            const icon = (s) => s === 'success' ? '✅' : '❌';

            let planBody = '';
            try {
              planBody = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
              if (planBody.length > MAX) {
                planBody = planBody.substring(0, MAX) + '\n\n_(truncated — see full output in the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))_';
              }
            } catch (e) {
              planBody = '_Plan output unavailable_';
            }

            const summary =
              plan === 'failure'     ? '> ❌ **Plan failed.** Fix errors before merging.' :
              exitcode === '0'       ? '> ✅ **No infrastructure changes detected.**' :
                                       '> ⚠️ **Changes detected — review the plan before merging.**';

            const body = [
              '<!-- terraform-plan-comment -->',
              '## Terraform Plan',
              '',
              '| Step | Status |',
              '|------|--------|',
              `| \`fmt\` | ${icon(fmt)} |`,
              `| \`init\` | ${icon(init)} |`,
              `| \`validate\` | ${icon(validate)} |`,
              `| \`plan\` | ${icon(plan)} |`,
              '',
              summary,
              '',
              '<details>',
              '<summary>Full plan output</summary>',
              '',
              '```hcl',
              planBody,
              '```',
              '</details>',
              '',
              `_Triggered by @${{ github.actor }} · [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`,
            ].join('\n');

            // Update existing comment rather than creating a new one on each push
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- terraform-plan-comment -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if fmt or plan failed
        if: steps.fmt.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: sandbox
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      # Apply re-runs plan rather than using the PR's saved plan artifact.
      # This ensures we apply against the current state of main, not a
      # potentially stale plan from when the PR was open.
      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -no-color \
            -var-file="config/${{ env.TF_ENVIRONMENT }}.tfvars"
